<!-- DATA SẢN PHẨM -->

<script src="../js/data.js"></script>

<!-- LỌC VÀ HIỂN THỊ SẢN PHẨM -->

<script>

const params = new URLSearchParams(window.location.search);

const category = params.get("category");


// =====================
// ĐỔI TIÊU ĐỀ THEO LOẠI
// =====================

const title = document.getElementById("title-product");


if(category === "nam"){

    title.innerHTML = "THỜI TRANG NAM";

}
else if(category === "nu"){

    title.innerHTML = "THỜI TRANG NỮ";

}
else if(category === "giay"){

    title.innerHTML = "GIÀY DÉP";

}
else if(category === "phukien"){

    title.innerHTML = "PHỤ KIỆN";

}
else{

    title.innerHTML = "TẤT CẢ SẢN PHẨM";

}
let list = products;
if(category){
    list = products.filter(
        p => p.category === category
    );
}
const box = document.getElementById("product-list");
if(list.length > 0){
    list.forEach(p => {
        box.innerHTML += `
        <div class="col-lg-3 col-md-6">
            <div class="card h-100 shadow-sm">
                <img src="${p.img}"
                     class="card-img-top"
                     style="height:250px;object-fit:cover;">

                <div class="card-body text-center">
                    <h5>
                        ${p.name}
                    </h5>
                    <p class="text-muted">
                        ${p.desc}
                    </p>
                    <p class="text-danger fw-bold">
                        ${p.price}
                    </p>
                    <a href="chitiet.html?id=${p.id}"
                       class="btn btn-dark">
                        Xem Chi Tiết
                    </a>
                </div>
            </div>
        </div>

        `;
    });
}
else{
    box.innerHTML = `
        <h3 class="text-center text-danger">
            Không tìm thấy sản phẩm
        </h3>
    `;
}
</script>
